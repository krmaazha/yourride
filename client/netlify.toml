[build]
  base = "client"
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

# Environment variables (set these in Netlify dashboard)
# VITE_API_URL = "your-render-backend-url"
# VITE_STRIPE_PUBLISHABLE_KEY = "pk_test_..."
